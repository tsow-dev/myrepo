<html>
<head>
    <title>Assignment 2 - Stocks</title>
    <link rel="stylesheet" href="Assignment2-Style.css">
</head>

<body onload="loadTopStocks(); setupAudio();">

    <h1 class="page-title">Stocks</h1>

    <nav id="main-nav">
        <ul>
            <li><a href="Assignment2-Home.html">Home</a></li>
            <li><a href="Assignment2-Stocks.html">Stocks</a></li>
            <li><a href="Assignment2-Dogs.html">Dogs</a></li>
        </ul>
    </nav>

    <div class="stock-section">
        <h2>Stock Lookup</h2>

        <form onsubmit="lookupStock(); return false;" class="stock-form">
            <label for="ticker">Stock Ticker:</label>
            <input type="text" id="ticker" required>

            <label for="days">Days:</label>
            <select id="days">
                <option value="30">30 Days</option>
                <option value="60">60 Days</option>
                <option value="90">90 Days</option>
            </select>

            <button class="small-button" type="submit">Lookup</button>
        </form>

        <canvas id="stockChart"></canvas>
    </div>

    <div class="stock-section">
        <h2>Top 5 Reddit Stocks</h2>

        <table id="top-stocks-table">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Comment Count</th>
                    <th>Sentiment</th>
                </tr>
            </thead>
            <tbody id="top-stocks-body"></tbody>
        </table>
    </div>

    <div class="audio-box">
        <h2>Audio Instructions</h2>
        <p>Use your microphone to control the website.</p>

        <ul>
            <li>Say: Hello</li>
            <li>Say: Change the color to &lt;color&gt;</li>
            <li>Say: Navigate to &lt;page&gt;</li>
            <li>Say: Lookup &lt;stock&gt;</li>
        </ul>

        <button onclick="turnOnAudio()">Turn On Audio</button>
        <button onclick="turnOffAudio()">Turn Off Audio</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="Assignment2-Script.js"></script>
</body>
</html>
